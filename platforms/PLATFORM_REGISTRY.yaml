# PLATFORM_REGISTRY.yaml — single source of truth for the gald3r platform roster (T516)
#
# This file is the ONE canonical list of every shipped platform. Every consumer
# (the check_platform_status status/matrix tooling, the PLATFORM_STATUS.md and
# PLATFORM_CAPABILITY_MATRIX.md row sets, the roster-parity gate wired into g-medic)
# derives its roster from here. Edit the roster HERE and nowhere else.
#
# Schema (one entry per platform under `platforms:`):
#   name           canonical id (matches the platforms/<dir> overlay name; lowercase, hyphenated)
#   display_name   human-facing product name
#   overlay_dir    the gald3r_templates/gald3r_core/platforms/<dir> overlay directory name
#   spec_path      the canonical PLATFORM_SPEC.md skill folder (relative to a .claude|.cursor
#                  skills root), or null for alias/redundant entries that ship no own spec
#   lifecycle      active | abandoned | off_target | redundant | stub
#                    active      — supported, shipped, spec present
#                    abandoned   — upstream development paused/frozen/discontinued
#                    off_target  — real product but not an IDE/coding-agent gald3r targets
#                    redundant   — an alias/duplicate of another entry (see alias_of)
#                    stub        — shipped overlay with only a stub spec (no verified capabilities)
#   alias_of       canonical name this entry duplicates (e.g. vibe -> mistral); null otherwise
#   support_level  tier1 | tier2 | tier3 | none   (rough operational support intent)
#   notes          free-form; owner-confirmable lifecycle defaults are flagged here
#
# Lifecycle seeds below come from the T516 task "Lifecycle seed" section (2026-06-02 STATUS
# scan). They are DEFAULTS pending the owner's GitHub-traffic comparison — every seeded
# retire/weak decision is flagged "owner-confirmable" in notes. No overlay is deleted by this
# registry; lifecycle only records intent for the parity gate and future curation.
#
# Roster invariant (enforced by check_roster_parity): the set of `name` values whose
# alias_of is null MUST equal the set of platforms/<dir> overlay directories.

