schema_id: CONSTRAINTS-md
schema_version: v1
gald3r_rel_version: "2.0.1"
description: >-
  Schema for .gald3r/CONSTRAINTS.md, the project constraint registry plus
  per-constraint definition blocks (markdown document).
applies_to: ".gald3r/CONSTRAINTS.md"

unknown_fields: allow

structure:
  document_type: markdown
  top_level_heading:
    required: true
  constraint_index:
    required: true
    description: "A '## Constraint Index' table listing each constraint ID and Status."
  constraint_blocks:
    required: false
    description: >-
      Per-constraint definition blocks. Active constraints SHOULD declare an
      '**Enforcement**:' field.

required:
  - top_level_heading
  - constraint_index

migration_notes:
  v1:
    added: [top_level_heading, constraint_index]
    note: "Initial versioned schema."
