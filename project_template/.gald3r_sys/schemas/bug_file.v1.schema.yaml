schema_id: bug-file
schema_version: v1
gald3r_rel_version: "2.2.0"
description: "Schema for individual bug files under .gald3r/bugs/**/*.md (YAML frontmatter)."
applies_to: ".gald3r/bugs/**/*.md"

unknown_fields: allow

required:
  id:
    type: string
    description: "Bug identifier (e.g. BUG-097)."
  title:
    type: string
    min_length: 5
    description: "Human-readable bug title."
  severity:
    type: enum
    values: [critical, high, medium, low]
    description: "Bug severity."
  status:
    type: enum
    # Derived from gald3r.schema.status.BugStatus (T519 single source of truth). Keep in
    # lockstep with the engine: tests/test_status_vocab.py fails if these drift. Canonical
    # tokens first, then accepted aliases (wont-fix -> wont_fix).
    values: [open, pending, in-progress, awaiting-verification, verification-in-progress, requires-user-attention, resolved, fixed, completed, documented, verified, closed, archived, paused, cancelled, wont_fix, wont-fix]
    description: "Bug lifecycle status (canonical BugStatus values + accepted aliases)."

optional:
  uuid:
    type: string
    format: "uuid"
    auto_populate: uuid4_on_create
    description: "Stable cross-project primary key (T522, RFC-4122 UUIDv4). The display id
      (BUG-###) is repo-local and renumbers on merge; uuid is the durable merge key. Auto-stamped
      on `bug new`; existing files backfilled by gald3r.ids.backfill_dir."
  resolution:
    type: string
    description: "Structured resolution detail (T521) — what fixed it / why closed. Lives on
      the bug file so a regenerated index need not carry free-text resolution prose."
  resolved_date:
    type: date
    format: "YYYY-MM-DD"
    description: "Date the bug reached a terminal status."
  reported_date:
    type: date
    format: "YYYY-MM-DD"
    auto_populate: git_creation_date
    description: "Date the bug was reported."
  reported_by:
    type: string
    description: "Who reported the bug (user or agent role)."
  file:
    type: string
    description: "Primary file path where the bug lives."
  line:
    type: integer
    description: "Line number of the bug site, if known."
  fixed_in_task:
    type: integer
    description: "Task ID that fixes this bug, if any."
  workspace_repos:
    type: list
    description: "Manifest repository.id values this bug spans."
  gald3r_rel_version:
    type: string
    auto_populate: current_framework_version
    description: "gald3r framework release version that produced/validated this file."
  schema_version:
    type: string
    auto_populate: current_schema_version
    description: "Schema version this file conforms to (e.g. bug-file-v1)."

migration_notes:
  v1:
    added: [id, title, severity, status]
    note: "Initial versioned schema."
