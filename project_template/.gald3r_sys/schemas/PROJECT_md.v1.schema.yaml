schema_id: PROJECT-md
schema_version: v1
gald3r_rel_version: "2.0.1"
description: >-
  Schema for .gald3r/PROJECT.md, the single source of truth for project
  identity, mission, goals, and project linking (markdown document).
applies_to: ".gald3r/PROJECT.md"

unknown_fields: allow

structure:
  document_type: markdown
  top_level_heading:
    required: true
  mission_section:
    required: true
    description: "A one-line (or short) mission statement."
  goals_section:
    required: true
    description: "Project goals (G-01, G-02, ...). Must not contain placeholder text."

required:
  - top_level_heading
  - mission_section
  - goals_section

migration_notes:
  v1:
    added: [top_level_heading, mission_section, goals_section]
    note: "Initial versioned schema."
