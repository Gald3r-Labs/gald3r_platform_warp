gald3r_rel_version: "2.0.1"
schema_version: "registry-v1"
description: "Maps file glob patterns to their schema IDs for g-medic validation"
schemas:
  - pattern: ".gald3r/tasks/**/*.md"
    schema_id: task-file
    current_version: v1
    history: [v1]
  - pattern: ".gald3r/bugs/**/*.md"
    schema_id: bug-file
    current_version: v1
    history: [v1]
  - pattern: ".gald3r/TASKS.md"
    schema_id: TASKS-md
    current_version: v1
    history: [v1]
  - pattern: ".gald3r/BUGS.md"
    schema_id: BUGS-md
    current_version: v1
    history: [v1]
  - pattern: ".gald3r/PLAN.md"
    schema_id: PLAN-md
    current_version: v1
    history: [v1]
  - pattern: ".gald3r/PROJECT.md"
    schema_id: PROJECT-md
    current_version: v1
    history: [v1]
  - pattern: ".gald3r/CONSTRAINTS.md"
    schema_id: CONSTRAINTS-md
    current_version: v1
    history: [v1]
  - pattern: ".gald3r/SUBSYSTEMS.md"
    schema_id: SUBSYSTEMS-md
    current_version: v1
    history: [v1]
  - pattern: ".gald3r/FEATURES.md"
    schema_id: FEATURES-md
    current_version: v1
    history: [v1]
  - pattern: ".gald3r/.identity"
    schema_id: identity
    current_version: v1
    history: [v1]
  - pattern: ".gald3r/features/*.md"
    schema_id: feature-file
    current_version: v1
    history: [v1]
  - pattern: ".gald3r/prds/*.md"
    schema_id: prd-file
    current_version: v1
    history: [v1]
  - pattern: ".gald3r/subsystems/*.md"
    schema_id: subsystem-file
    current_version: v1
    history: [v1]
