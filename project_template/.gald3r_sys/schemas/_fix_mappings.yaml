gald3r_rel_version: "2.0.1"
schema_version: "fix-mappings-v1"
description: >-
  Canonical, extensible enum auto-fix mappings consumed by g-medic's L1 schema
  validation layer. When a required enum field (status, priority, type) holds an
  invalid value, g-medic looks the value up here. A hit means the fix is
  unambiguous and is auto-applied (and logged). A miss means the value is
  ambiguous: g-medic does NOT guess -- it inserts a TODO marker instead.
#
# WHY THIS FILE EXISTS -- the "done" status incident:
#   Task files were authored with `status: done`, a value that is NOT in the
#   task-file schema's status enum (the current lifecycle uses `qa_complete`).
#   The TASKS.md legend had also diverged. Nothing caught it, so the drift
#   silently spread. The `done -> qa_complete` mapping below is the canonical
#   fix for that incident: g-medic now auto-migrates `done` to `qa_complete`
#   wherever it appears, and the session-start probe (g-rl-25 Step 10) surfaces
#   the drift on the next session. Mappings live in this YAML data file -- not
#   in code -- so new aliases can be added without changing any skill/rule logic.
#
# FORMAT: <field>: { <invalid_value>: <canonical_value>, ... }
#   - Keys are matched case-insensitively against the file's frontmatter value.
#   - Only values that map UNAMBIGUOUSLY to exactly one canonical enum value
#     belong here. Anything genuinely ambiguous must be left out so g-medic
#     falls through to TODO insertion.

status:
  done:         qa_complete   # canonical fix for the "done status incident"
  complete:     qa_complete
  completed:    qa_complete
  wip:          coding
  active:       coding
  in_progress:  in-progress   # underscore -> hyphen normalization
  blocked:      resource_gated
  hold:         paused

priority:
  urgent:       critical
  blocker:      critical
  nice_to_have: low
