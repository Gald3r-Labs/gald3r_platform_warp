schema_id: task-file
schema_version: v1
gald3r_rel_version: "2.1.2"
description: "Schema for individual task files under .gald3r/tasks/**/*.md (YAML frontmatter)."
applies_to: ".gald3r/tasks/**/*.md"

# Unknown fields are permitted so that forward-compatible task metadata
# (added by newer gald3r releases) does not trip validation.
unknown_fields: allow

required:
  id:
    type: integer
    description: "Sequential task ID (global, monotonic across the project)."
  title:
    type: string
    min_length: 5
    description: "Human-readable task title."
  type:
    type: enum
    values: [feature, bug_fix, refactor, chore, documentation, research]
    description: "Task category."
  status:
    type: enum
    description: >-
      Task lifecycle status. The first block is the current vocabulary; the legacy
      block lists values that remain VALID for back-compat but are not written by new
      files. AUTHORITATIVE SOURCE: the engine validator `gald3r.schema.task` (STATUSES +
      LEGACY_STATUSES) -- this YAML mirrors what the engine enforces at runtime. g-medic
      may migrate a legacy value to its nearest current value during a migration pass.
    values:
      # --- current lifecycle (engine STATUSES) ---
      - pending
      - speccing
      - in-progress
      - awaiting-verification
      - verification-in-progress
      - completed
      - failed
      - paused
      - cancelled
      # --- legacy (valid but deprecated; engine LEGACY_STATUSES) ---
      - waiting
      - resource-gated
      - requires-user-attention
      - verified
      - closed
    legacy_values_note: >-
      waiting, resource-gated, requires-user-attention, verified, and closed are legacy
      values: valid for validation but deprecated. New task files use the current
      vocabulary above, which is kept in lockstep with the engine's enforced STATUSES.
  priority:
    type: enum
    values: [critical, high, medium, low]
    description: "Task priority."
  created_date:
    type: date
    format: "YYYY-MM-DD"
    auto_populate: git_creation_date
    description: "Date the task file was first created."

optional:
  uuid:
    type: string
    format: "uuid"
    auto_populate: uuid4_on_create
    description: "Stable cross-project primary key (T522, RFC-4122 UUIDv4). The display id
      (T###) is repo-local and renumbers on merge; uuid is the durable merge key. Auto-stamped
      on `task new`; existing files backfilled by gald3r.ids.backfill_dir."
  workspace_repos:
    type: list
    description: "Manifest repository.id values this task's blast radius spans."
  dependencies:
    type: list
    description: "Task IDs this task depends on."
  release_hold:
    type: enum
    values: [none, manual, sync_required]
    default: none
    description: "Whether the task is held back from release and why."
  gald3r_rel_version:
    type: string
    auto_populate: current_framework_version
    description: "gald3r framework release version that produced/validated this file."
  schema_version:
    type: string
    auto_populate: current_schema_version
    description: "Schema version this file conforms to (e.g. task-file-v1)."

migration_notes:
  v1:
    added: [id, title, type, status, priority, created_date]
    note: "Initial versioned schema."
