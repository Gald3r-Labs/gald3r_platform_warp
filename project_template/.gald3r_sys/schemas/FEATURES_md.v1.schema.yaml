schema_id: FEATURES-md
schema_version: v1
gald3r_rel_version: "2.1.0"
description: >-
  Schema for .gald3r/FEATURES.md, the feature registry index (markdown
  document). Source of truth for full feature metadata is the per-feature file
  under .gald3r/features/.
applies_to: ".gald3r/FEATURES.md"

unknown_fields: allow

structure:
  document_type: markdown
  top_level_heading:
    required: true
  feature_rows:
    required: true
    description: "Feature entries with at minimum an ID, title, and staging status."
    required_columns: [id, title, status]

required:
  - top_level_heading
  - feature_rows

cross_reference:
  validates_against: feature-file

migration_notes:
  v1:
    added: [top_level_heading, feature_rows]
    note: "Initial versioned schema."
