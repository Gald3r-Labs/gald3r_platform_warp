schema_id: prd-file
schema_version: v1
gald3r_rel_version: "2.3.0"
description: "Schema for individual PRD files under .gald3r/prds/*.md (YAML frontmatter)."
applies_to: ".gald3r/prds/*.md"

unknown_fields: allow

required:
  id:
    type: string
    description: "PRD identifier (e.g. PRD-001)."
  title:
    type: string
    min_length: 5
    description: "PRD title."
  status:
    type: enum
    values: [draft, review, approved, in-implementation, released, superseded, archived]
    description: "PRD governance lifecycle status."

optional:
  supersedes:
    type: string
    description: "PRD ID this PRD supersedes, if any."
  superseded_by:
    type: string
    description: "PRD ID that supersedes this PRD (mutable exactly once during atomic revise)."
  gald3r_rel_version:
    type: string
    auto_populate: current_framework_version
  schema_version:
    type: string
    auto_populate: current_schema_version

freeze_note: >-
  PRDs in status 'released' or 'superseded' are immutable (C-019). Only
  @g-prd-revise may change a frozen PRD.

migration_notes:
  v1:
    added: [id, title, status]
    note: "Initial versioned schema."
