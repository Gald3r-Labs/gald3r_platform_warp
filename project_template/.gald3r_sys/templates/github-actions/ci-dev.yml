# _dev tier CI workflow template (T1419)
# Copy to: {project}_dev/.github/workflows/ci-dev.yml
#
# Purpose: Fast feedback on all development branches.
# Runs: lint, type-check, unit tests, security scan on every push/PR.

name: CI — Dev Tier

on:
  push:
    branches: [dev, "feature/**", "gald3r/**", "hotfix/**"]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint + Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Python (adjust or remove if not applicable) ─────────────────────
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install deps
        run: |
          pip install uv
          uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (pyright)
        run: uv run pyright

      # ── Node/TypeScript (adjust or remove if not applicable) ─────────────
      # - uses: actions/setup-node@v4
      #   with: { node-version: "20" }
      # - run: npm ci
      # - run: npm run lint
      # - run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install deps
        run: |
          pip install uv
          uv sync --dev

      - name: Run unit tests
        run: uv run pytest tests/unit -v --tb=short

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit (Python security)
        uses: PyCQA/bandit-action@v1
        with:
          targets: "."
          configfile: "pyproject.toml"
        continue-on-error: true   # Advisory — does not block dev merges

      - name: Check for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
