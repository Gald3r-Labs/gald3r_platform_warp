# public tier CI workflow template (T1419)
# Copy to: {project}/.github/workflows/ci-public.yml
#
# Purpose: Build release artifact and publish to package registry.
# Runs: ONLY on manual push from graduation script (humans push this).
# No test suite — already validated in _test tier.

name: CI — Public Release

on:
  push:
    tags: ["v*"]     # Only fires when graduation script pushes a version tag
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.7.0)"
        required: true

jobs:
  build-and-publish:
    name: Build + Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write         # Create GitHub release
      id-token: write         # PyPI trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install build tools
        run: pip install uv

      - name: Build
        run: uv build

      # ── Publish to PyPI (trusted publishing — no API key needed) ─────────
      # Uncomment and configure if this is a Python package:
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1

      # ── Publish to npm (uncomment if JavaScript/TypeScript package) ───────
      # - uses: actions/setup-node@v4
      #   with: { node-version: "20", registry-url: "https://registry.npmjs.org" }
      # - run: npm ci && npm publish
      #   env:
      #     NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/*"
          bodyFile: "releases/RELEASE_${{ github.ref_name }}.md"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          draft: false
          prerelease: false

  update-release-index:
    name: Update Release Index
    runs-on: ubuntu-latest
    needs: build-and-publish
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Verify RELEASE file present
        run: |
          VERSION="${{ github.ref_name }}"
          FILE="releases/RELEASE_${VERSION}.md"
          if [ ! -f "$FILE" ]; then
            echo "ERROR: $FILE not found. Did the graduation script commit it?"
            exit 1
          fi
          echo "Release file: $FILE"
          wc -l "$FILE"
