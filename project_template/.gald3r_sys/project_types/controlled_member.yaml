name: controlled_member
display_name: "Controlled Member Repository"
description: "A workspace member whose task tracking is owned by the controller. Carries only a slim .gald3r/ marker (.identity + PROJECT.md)."
version: "1.0.0"

required_folders: []

required_files:
  - .identity
  - PROJECT.md

optional_folders: []

optional_files: []

# HARD RULE (enforced by check_member_repo_gald3r_guard.py — see BUG-021 / T213):
# No TASKS.md, BUGS.md, PLAN.md, FEATURES.md, bugs/, tasks/, or any live
# control-plane state may exist in a controlled_member .gald3r/.
# The controller (<gald3r_source>) is the single source of truth.

default_constraints: []

default_subsystems: []

gitignore_additions:
  - ".gald3r-worktree.json"

identity_fields:
  wpac_role: controlled_member
  project_type: controlled_member
  member_gald3r_marker_only: "true"

features:
  task_tracking: false         # Owned by controller — NEVER create locally
  bug_tracking: false          # Owned by controller
  release_management: false
  git_workflow: none
  branch_protection_level: simple
  graduation_tier: single
  wpac_role: controlled_member

badge: "🔗"
color: "#A8A8A8"

marketplace:
  author: "gald3r"
  homepage: "https://github.com/gald3r/gald3r"
  license: "MIT"
  tags: [ecosystem, wpac, member]
  min_gald3r_version: "1.6.0"
